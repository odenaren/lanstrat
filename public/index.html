<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laneight Strategy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0b0d;
    --surface: #12151a;
    --surface2: #1a1f28;
    --border: #252c38;
    --gold: #c89b3c;
    --gold-light: #e8c06a;
    --gold-dim: #7a5c1e;
    --text: #d4cfc7;
    --text-dim: #7a7a7a;
    --red: #c0392b;
    --green: #27ae60;
    --blue: #2980b9;
    --purple: #8e44ad;
    --teal: #16a085;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  h1, h2, h3, .title-font {
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.05em;
  }

  /* NAV */
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--gold-dim);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 56px;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    flex: 0 0 auto;
  }
  .nav-logo span { color: var(--text-dim); font-weight: 400; }
  .nav-tabs { display: flex; gap: 4px; margin-left: auto; }
  .nav-tab {
    padding: 6px 16px;
    background: none;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    border-radius: 3px;
  }
  .nav-tab:hover { color: var(--text); border-color: var(--border); }
  .nav-tab.active { color: var(--gold); border-color: var(--gold-dim); background: rgba(200,155,60,0.08); }

  /* PAGES */
  .page { display: none; padding: 28px 24px; max-width: 1400px; margin: 0 auto; }
  .page.active { display: block; }

  /* HOME PAGE */
  .home-header {
    text-align: center;
    padding: 48px 0 40px;
  }
  .home-header h1 {
    font-size: 48px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    line-height: 1;
  }
  .home-header p {
    color: var(--text-dim);
    margin-top: 10px;
    font-size: 15px;
  }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-top: 32px;
  }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .player-card:hover { border-color: var(--gold-dim); background: var(--surface2); }
  .player-card-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .player-card-count {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }
  .player-card-count span { color: var(--gold); font-weight: 500; }
  .player-card-roles {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .role-pill {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .role-pill.carry { border-color: #c0392b55; color: #e74c3c; }
  .role-pill.support { border-color: #2980b955; color: #3498db; }
  .role-pill.mid { border-color: #8e44ad55; color: #9b59b6; }
  .role-pill.offlane { border-color: #16a08555; color: #1abc9c; }
  .role-pill.jungle { border-color: #27ae6055; color: #2ecc71; }

  .player-card-btn {
    margin-top: 16px;
    width: 100%;
    padding: 8px;
    background: rgba(200,155,60,0.1);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .player-card-btn:hover { background: rgba(200,155,60,0.2); }

  .add-player-card {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 120px;
    gap: 8px;
    color: var(--text-dim);
  }
  .add-player-card:hover { border-color: var(--gold-dim); color: var(--gold); }
  .add-player-card .plus { font-size: 32px; line-height: 1; }
  .add-player-card span { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

  /* HERO PICKER PAGE */
  .picker-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .picker-header h2 {
    font-size: 28px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  .picker-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .quick-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .quick-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .quick-btn.danger:hover { border-color: #c0392b; color: #e74c3c; }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 3px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    width: 200px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--gold-dim); }
  .search-input::placeholder { color: var(--text-dim); }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .filter-label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 2px; }
  .filter-btn {
    padding: 4px 12px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active { color: var(--gold); border-color: var(--gold-dim); background: rgba(200,155,60,0.08); }

  .selected-count {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-dim);
  }
  .selected-count strong { color: var(--gold); }

  /* outer container for attr-sections — block flow */
  #hero-grid { display: block; }

  /* inner grid inside each attr-section */
  .hero-inner-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
    gap: 6px;
  }

  .hero-card {
    aspect-ratio: 16/9;
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.12s;
    display: flex;
    align-items: flex-end;
  }
  .hero-card:hover { border-color: var(--gold-dim); transform: scale(1.04); z-index: 1; }
  .hero-card.selected { border-color: var(--gold); }
  .hero-card.selected::after {
    content: '✓';
    position: absolute;
    top: 3px;
    right: 4px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    text-shadow: 0 0 4px #000;
  }
  .hero-card.dimmed { opacity: 0.25; }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1a2030, #252c3a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .hero-name {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 2px 4px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    font-size: 10px;
    font-weight: 500;
    color: #fff;
    text-align: center;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ATTR SECTION */
  .attr-section { margin-bottom: 24px; }
  .attr-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .attr-icon { font-size: 18px; }
  .attr-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .attr-label.str { color: #e74c3c; }
  .attr-label.agi { color: #2ecc71; }
  .attr-label.int { color: #3498db; }
  .attr-label.uni { color: #9b59b6; }
  .attr-count { color: var(--text-dim); font-size: 12px; margin-left: auto; }

  .save-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--gold-dim);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 200;
  }
  .save-status { color: var(--text-dim); font-size: 13px; }
  .save-status.saved { color: var(--green); }
  .save-btn {
    margin-left: auto;
    padding: 8px 24px;
    background: var(--gold);
    border: none;
    color: #0a0b0d;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .save-btn:hover { background: var(--gold-light); }

  /* MATCH PAGE */
  .match-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 800px) { .match-layout { grid-template-columns: 1fr; } }

  .match-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
  }
  .match-panel h3 {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .player-select-list { display: flex; flex-direction: column; gap: 8px; }
  .player-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .player-toggle:hover { border-color: var(--gold-dim); }
  .player-toggle.active { border-color: var(--gold); background: rgba(200,155,60,0.08); }
  .player-toggle-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex: 1;
  }
  .player-toggle-heroes { font-size: 12px; color: var(--text-dim); }
  .player-toggle.active .player-toggle-heroes { color: var(--gold); }
  .checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.15s;
  }
  .player-toggle.active .checkbox { background: var(--gold); border-color: var(--gold); color: #000; }

  .gen-btn {
    width: 100%;
    margin-top: 16px;
    padding: 10px 12px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border: none;
    color: #0a0b0d;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .gen-btn:hover { filter: brightness(1.1); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

  .strategy-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    min-height: 400px;
  }
  .strategy-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    color: var(--text-dim);
    text-align: center;
    gap: 12px;
  }
  .strategy-placeholder .icon { font-size: 48px; opacity: 0.3; }
  .strategy-placeholder p { font-size: 14px; }

  .strategy-output h2 {
    font-size: 26px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .strategy-output .sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 20px;
  }

  .strategy-section { margin-bottom: 20px; }
  .strategy-section h4 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .hero-lane-list { display: flex; flex-direction: column; gap: 8px; }
  .hero-lane-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .hero-lane-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .hero-lane-detail {}
  .hero-lane-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .hero-lane-name .role-tag {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 8px;
    font-weight: 400;
    letter-spacing: 0.03em;
    font-family: 'Inter', sans-serif;
    text-transform: none;
  }
  .hero-lane-desc { font-size: 12px; color: var(--text-dim); margin-top: 3px; line-height: 1.5; }

  .strategy-prose { font-size: 14px; color: var(--text); line-height: 1.7; }
  .strategy-prose p { margin-bottom: 10px; }

  .thinking-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    padding: 16px 0;
    font-size: 14px;
  }
  .dots { display: inline-flex; gap: 4px; }
  .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ADD PLAYER MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    padding: 28px;
    width: 380px;
    max-width: 95vw;
  }
  .modal h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }
  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 16px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }
  .modal-input:focus { border-color: var(--gold-dim); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-cancel {
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 3px;
  }
  .modal-confirm {
    padding: 8px 20px;
    background: var(--gold);
    border: none;
    color: #0a0b0d;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 3px;
  }

  .share-link-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-dim);
    word-break: break-all;
    margin-top: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .share-link-box:hover { border-color: var(--gold-dim); }
  .share-link-box .copy-hint { color: var(--text-dim); font-size: 11px; flex-shrink: 0; }

  .strategy-raw {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .strategy-raw h2, .strategy-raw h3 {
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 18px 0 8px;
  }
  .strategy-raw strong { color: var(--gold-light); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Lane<span>ight</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('home')">Spelare</button>
    <button class="nav-tab" onclick="showPage('match')">Matchen</button>
  </div>
</nav>

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="home-header">
    <h1>Hero Pool Manager</h1>
    <p>Varje spelare sparar sina hjältar — AI draftar strategin</p>
  </div>
  <div id="player-grid" class="player-grid"></div>
</div>

<!-- HERO PICKER PAGE -->
<div id="page-picker" class="page">
  <div class="picker-header">
    <button class="back-btn" onclick="showPage('home')">← Tillbaka</button>
    <h2 id="picker-player-name">Spelare</h2>
  </div>

  <div class="picker-controls">
    <button class="quick-btn" onclick="selectAll()">Välj alla</button>
    <button class="quick-btn" onclick="selectNone()" style="--hover-c:#e74c3c">Rensa alla</button>
    <button class="quick-btn" onclick="invertSelection()">Invertera</button>
    <input class="search-input" id="hero-search" placeholder="Sök hjälte..." oninput="filterHeroes()">
    <span class="selected-count"><strong id="selected-num">0</strong> / <span id="total-num">124</span> valda</span>
  </div>

  <div class="filter-row">
    <span class="filter-label">Roll:</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Alla</button>
    <button class="filter-btn" data-filter="Carry" onclick="setFilter('Carry', this)">Carry</button>
    <button class="filter-btn" data-filter="Mid" onclick="setFilter('Mid', this)">Mid</button>

const API = '/api';

let currentPlayer = null;
let currentSelected = new Set();
let currentFilter = 'all';
let currentAttr = 'all';

async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...options
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadPlayers() {
  players = await apiFetch('/players');
  renderHome();
}

// ===================== NAV =====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => {
    if (t.textContent.toLowerCase().includes(id === 'home' ? 'spelare' : 'matchen')) t.classList.add('active');
  });
  if (id === 'home') loadPlayers();
  if (id === 'match') loadPlayers().then(() => renderMatchPage());
}

// ===================== HOME =====================
function renderHome() {
  const grid = document.getElementById('player-grid');
  grid.innerHTML = '';
  players.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'player-card';
    const count = (p.heroes || []).length;
    const roles = getTopRoles(p.heroes || []);
    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div class="player-card-name">${p.name}</div>
        <button onclick="deletePlayer(event,'${p.name}')" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:0;line-height:1;flex-shrink:0" title="Ta bort spelare">✕</button>
      </div>
      <div class="player-card-count"><span>${count}</span> hjältar valda</div>
      <div class="player-card-roles">${roles.map(r=>`<span class="role-pill ${r.toLowerCase()}">${r}</span>`).join('')}</div>
      <button class="player-card-btn" onclick="openPicker(${i})">Redigera pool</button>
    `;
    grid.appendChild(card);
  });

  // Add player button
  const addCard = document.createElement('div');
  addCard.className = 'add-player-card';
  addCard.innerHTML = `<div class="plus">+</div><span>Lägg till spelare</span>`;
  addCard.onclick = openAddModal;
  grid.appendChild(addCard);
}

function getTopRoles(heroIds) {
  const roleCount = {};
  heroIds.forEach(id => {
    const h = HERO_LIST.find(x => x.id === id);
    if (!h) return;
    h.roles.forEach(r => { roleCount[r] = (roleCount[r] || 0) + 1; });
  });
  return Object.entries(roleCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
}

function openAddModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('new-player-name').value = '';
  setTimeout(() => document.getElementById('new-player-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function deletePlayer(event, name) {
  event.stopPropagation();
  if (!confirm('Ta bort ' + name + '?')) return;
  try {
    players = await apiFetch('/players/' + encodeURIComponent(name), { method: 'DELETE' });
    renderHome();
  } catch (err) {
    alert('Kunde inte ta bort spelare: ' + err.message);
  }
}

async function confirmAddPlayer() {
  const name = document.getElementById('new-player-name').value.trim().toUpperCase();
  if (!name) return;
  try {
    players = await apiFetch('/players', {
      method: 'POST',
      body: JSON.stringify({ name })
    });
    closeModal();
    renderHome();
  } catch (err) {
    alert('Kunde inte lägga till spelare: ' + err.message);
  }
}

  // No-op: individual saves handled by savePool and addPlayer

// ===================== URL SHARING =====================
function getPlayerLink(playerIndex) {
  const url = new URL(window.location.href);
  url.searchParams.set('player', playerIndex);
  return url.toString();
}

// Check URL on load
function checkUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const pi = params.get('player');
  if (pi !== null && players[parseInt(pi)]) {
    openPicker(parseInt(pi));
  }
}

// ===================== HERO PICKER =====================
function openPicker(playerIndex) {
  currentPlayer = playerIndex;
  currentSelected = new Set(players[playerIndex].heroes || []);
  document.getElementById('picker-player-name').textContent = players[playerIndex].name;
  document.getElementById('hero-search').value = '';
  currentFilter = 'all';
  currentAttr = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all' || b.dataset.attr === 'all');
  });
  document.getElementById('save-status').textContent = 'Inga ändringar';
  document.getElementById('save-status').className = 'save-status saved';

  // Show share link
  renderHeroGrid();
  showPage('picker');

  // Update URL
  const url = new URL(window.location.href);
  url.searchParams.set('player', playerIndex);
  window.history.replaceState({}, '', url);
}

function renderHeroGrid() {
  const grid = document.getElementById('hero-grid');
  const search = document.getElementById('hero-search').value.toLowerCase();
  grid.innerHTML = '';

  const filtered = HERO_LIST.filter(h => {
    const matchSearch = !search || h.name.toLowerCase().includes(search);
    const matchRole = currentFilter === 'all' || h.roles.includes(currentFilter);
    const matchAttr = currentAttr === 'all' || h.attr === currentAttr;
    return matchSearch && matchRole && matchAttr;
  });

  const byAttr = { str: [], agi: [], int: [], uni: [] };
  filtered.forEach(h => byAttr[h.attr].push(h));

  const attrOrder = ['str', 'agi', 'int', 'uni'];
  attrOrder.forEach(attr => {
    if (!byAttr[attr].length) return;
    const section = document.createElement('div');
    section.className = 'attr-section';
    const header = document.createElement('div');
    header.className = 'attr-header';
    header.innerHTML = `<span class="attr-icon">${ATTR_ICONS[attr]}</span><span class="attr-label ${attr}">${ATTR_LABELS[attr]}</span><span class="attr-count">${byAttr[attr].length} hjältar</span>`;
    section.appendChild(header);

    const innerGrid = document.createElement('div');
    innerGrid.className = 'hero-inner-grid';
    byAttr[attr].forEach(h => {
      const card = document.createElement('div');
      card.className = 'hero-card' + (currentSelected.has(h.id) ? ' selected' : '');
      card.innerHTML = `<div class="hero-bg">${ATTR_ICONS[h.attr]}</div><div class="hero-name">${h.name}</div>`;
      card.onclick = () => toggleHero(h.id, card);
      innerGrid.appendChild(card);
    });

    section.appendChild(innerGrid);
    grid.appendChild(section);
  });

  updateSelectedCount();
}

function toggleHero(id, card) {
  if (currentSelected.has(id)) {
    currentSelected.delete(id);
    card.classList.remove('selected');
  } else {
    currentSelected.add(id);
    card.classList.add('selected');
  }
  markUnsaved();
  updateSelectedCount();
}

function updateSelectedCount() {
  document.getElementById('selected-num').textContent = currentSelected.size;
  document.getElementById('total-num').textContent = HERO_LIST.length;
}

function markUnsaved() {
  const el = document.getElementById('save-status');
  el.textContent = 'Osparade ändringar';
  el.className = 'save-status';
  // Auto-save after 2s
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(savePool, 2000);
}

async function savePool() {
  if (currentPlayer === null) return;
  const player = players[currentPlayer];
  player.heroes = [...currentSelected];
  try {
    await apiFetch('/players/' + encodeURIComponent(player.name) + '/heroes', {
      method: 'PUT',
      body: JSON.stringify({ heroes: player.heroes })
    });
    const el = document.getElementById('save-status');
    el.textContent = '✓ Sparat';
    el.className = 'save-status saved';
  } catch (err) {
    const el = document.getElementById('save-status');
    el.textContent = '⚠ Fel vid sparning';
    el.className = 'save-status';
  }
}

function selectAll() {
  const search = document.getElementById('hero-search').value.toLowerCase();
  HERO_LIST.filter(h => {
    const matchSearch = !search || h.name.toLowerCase().includes(search);
    const matchRole = currentFilter === 'all' || h.roles.includes(currentFilter);
    const matchAttr = currentAttr === 'all' || h.attr === currentAttr;
    return matchSearch && matchRole && matchAttr;
  }).forEach(h => currentSelected.add(h.id));
  renderHeroGrid();
  markUnsaved();
}

function selectNone() {
  const search = document.getElementById('hero-search').value.toLowerCase();
  HERO_LIST.filter(h => {
    const matchSearch = !search || h.name.toLowerCase().includes(search);
    const matchRole = currentFilter === 'all' || h.roles.includes(currentFilter);
    const matchAttr = currentAttr === 'all' || h.attr === currentAttr;
    return matchSearch && matchRole && matchAttr;
  }).forEach(h => currentSelected.delete(h.id));
  renderHeroGrid();
  markUnsaved();
}

function invertSelection() {
  const search = document.getElementById('hero-search').value.toLowerCase();
  HERO_LIST.filter(h => {
    const matchSearch = !search || h.name.toLowerCase().includes(search);
    const matchRole = currentFilter === 'all' || h.roles.includes(currentFilter);
    const matchAttr = currentAttr === 'all' || h.attr === currentAttr;
    return matchSearch && matchRole && matchAttr;
  }).forEach(h => {
    if (currentSelected.has(h.id)) currentSelected.delete(h.id);
    else currentSelected.add(h.id);
  });
  renderHeroGrid();
  markUnsaved();
}

function filterHeroes() { renderHeroGrid(); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHeroGrid();
}

function setAttr(a, btn) {
  currentAttr = a;
  document.querySelectorAll('[data-attr]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHeroGrid();
}

// ===================== MATCH PAGE =====================
let matchPlayers = new Set();

function renderMatchPage() {
  const list = document.getElementById('player-select-list');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'player-toggle' + (matchPlayers.has(i) ? ' active' : '');
    item.innerHTML = `
      <div class="checkbox">${matchPlayers.has(i) ? '✓' : ''}</div>
      <div style="flex:1">
        <div class="player-toggle-name">${p.name}</div>
        <div class="player-toggle-heroes">${(p.heroes||[]).length} hjältar i poolen</div>
      </div>
    `;
    item.onclick = () => {
      if (matchPlayers.has(i)) matchPlayers.delete(i);
      else matchPlayers.add(i);
      renderMatchPage();
    };
    list.appendChild(item);
  });

  const count = matchPlayers.size;
  const genBtn = document.getElementById('gen-btn');
  const valid = count >= 3 && count <= 5;
  genBtn.disabled = !valid;
  genBtn.textContent = valid
    ? `Generera strategi (${count} spelare)`
    : count < 3 ? 'Välj minst 3 spelare' : 'Max 5 spelare';
}

function getLaningContext(n) {
  if (n === 5) return 'Ni är ett fullt lag (5v5). Tilldela alla fem roller: Carry (safe lane pos 1), Mid (pos 2), Offlaner (pos 3), Support 4 (soft support), Support 5 (hard support).';
  if (n === 4) return 'Ni är 4 spelare. Tilldela fyra roller. Förslag: Carry (pos 1), Mid (pos 2), Offlaner (pos 3), och en flexibel Support/roamer (pos 4 eller 5). Anpassa för att klara er utan en femte spelare i early game — välj gärna en hjälte som ensam klarar lane 4 eller 5.';
  if (n === 3) return 'Ni är 3 spelare. Tilldela tre kärnroller. Prioritera solo-starka hjältar. Förslag: Carry (pos 1), Mid (pos 2), och en flexibel tredje roll (Offlaner eller roaming Support). De två okända lagkamraterna kan fylla resterande roller.';
  return '';
}

async function generateStrategy() {
  const active = [...matchPlayers].map(i => players[i]);
  const n = active.length;
  if (n < 3 || n > 5) return;

  const area = document.getElementById('strategy-area');
  area.innerHTML = `<div class="thinking-indicator"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> AI analyserar hero pools och genererar strategi för ${n} spelare...</div>`;

  const poolSummary = active.map(p => {
    const heroNames = (p.heroes || []).map(id => {
      const h = HERO_LIST.find(x => x.id === id);
      return h ? h.name + ' (' + h.roles.join('/') + ')' : null;
    }).filter(Boolean);
    return p.name + ': ' + (heroNames.join(', ') || 'Inga hjältar valda');
  }).join('\n\n');

  const laningCtx = getLaningContext(n);

  const prompt = 'Du är en Dota 2 draft-expert. ' + n + ' spelare ska spela en match. Ta fram en optimal draft-strategi baserat på deras hero pools.\n\nHERO POOLS:\n' + poolSummary + '\n\nLANING-KONTEXT:\n' + laningCtx + '\n\nGe en konkret matchstrategi med:\n1. **Rekommenderad draft** – vilken hjälte varje spelare bör spela och varför (välj alltid från deras pool, namnge spelaren)\n2. **Laning setup** – vem spelar vilken roll/lane (anpassat för ' + n + ' spelare)\n3. **Spelstil och gameplan** – early/mid/late-game strategi\n4. **Nyckelsynergier** – vilka kombos som är starka ihop\n5. **Win condition** – vad ni ska sikta på för att vinna\n\nVar konkret och specifik. Använd svenska. Formatera med tydliga rubriker.';

  try {
    const resp = await fetch('/api/strategy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    const text = data.text;

    area.innerHTML = `<div class="strategy-output">
      <h2>DRAFT STRATEGI</h2>
      <div class="sub">Spelare: ${active.map(p=>p.name).join(', ')}</div>
      <div class="strategy-raw">${markdownToHtml(text)}</div>
    </div>`;
  } catch (err) {
    area.innerHTML = `<div class="strategy-placeholder"><div class="icon">⚠️</div><p>Fel vid AI-anrop: ${err.message}</p></div>`;
  }
}

function markdownToHtml(md) {
  return md
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

// ===================== INIT =====================
loadPlayers().then(() => checkUrlParams());

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Keyboard shortcut: save with Ctrl+S
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (currentPlayer !== null) savePool();
  }
});

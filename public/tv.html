<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dreamhack Skyrup — The Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#c89b3c;--gold-dim:#7a5c1e;--gold-light:#e8c46a;
  --bg:#0a0b0d;--surface:#12141a;--text:#e8e6e0;--text-dim:#6b6860;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes zoomIn{from{opacity:0;transform:scale(1.08)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

#screen{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative;}

/* IDLE */
#idle{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;text-align:center;}
#idle .logo{font-size:80px;font-weight:700;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;}
#idle .sub{font-size:22px;color:var(--text-dim);letter-spacing:.3em;text-transform:uppercase;}
#idle .waiting{font-size:16px;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;animation:pulse 2s infinite;}
.gold-line{width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* NAME SPLASH */
#splash{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;padding:60px;}
#splash .strat-name{font-size:clamp(48px,8vw,96px);font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;line-height:1.1;}
#splash .wild-badge{font-size:28px;color:#9b59b6;letter-spacing:.1em;margin-top:8px;}
#splash .strat-line{width:300px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* HERO REVEAL */
#hero-reveal{display:none;width:100%;height:100%;position:relative;overflow:hidden;}
#hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:blur(40px) brightness(.3);transform:scale(1.1);transition:none;}
#hero-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
#hero-img-wrap{width:min(600px,70vw);height:min(340px,40vw);border-radius:12px;overflow:hidden;border:2px solid var(--gold-dim);box-shadow:0 0 80px rgba(200,155,60,.3);}
#hero-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;}
#hero-name-tv{font-size:clamp(36px,6vw,72px);font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-top:32px;}
#player-name-tv{font-size:clamp(18px,2.5vw,32px);color:var(--text-dim);letter-spacing:.25em;text-transform:uppercase;margin-top:8px;}
#pick-counter{position:absolute;bottom:40px;right:60px;font-size:18px;color:var(--text-dim);letter-spacing:.1em;}

/* BRIEFING */
#briefing-screen{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px;text-align:center;gap:32px;}
#briefing-screen .brief-title{font-size:20px;font-weight:700;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;}
#briefing-screen .brief-text{font-size:clamp(22px,3vw,40px);line-height:1.7;color:var(--text);max-width:1100px;}

/* WELCOME */
#welcome{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:32px;position:relative;overflow:hidden;}
#welcome .dhs-logo{font-size:clamp(80px,14vw,160px);font-weight:700;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;text-shadow:0 0 60px rgba(200,155,60,.5);animation:logoPulse 3s ease-in-out infinite;}
#welcome .dhs-sub{font-size:clamp(16px,2vw,28px);color:var(--text-dim);letter-spacing:.4em;text-transform:uppercase;}
.spotlight{position:absolute;width:300px;height:600px;background:linear-gradient(180deg,rgba(200,155,60,.08) 0%,transparent 100%);border-radius:50%;pointer-events:none;transform-origin:bottom center;}

@keyframes logoPulse{0%,100%{text-shadow:0 0 40px rgba(200,155,60,.4)}50%{text-shadow:0 0 100px rgba(200,155,60,.8),0 0 200px rgba(200,155,60,.3)}}
@keyframes spot1{0%{transform:rotate(-30deg) translateX(-200px);opacity:0}10%{opacity:1}50%{transform:rotate(20deg) translateX(200px);opacity:.8}90%{opacity:1}100%{transform:rotate(-30deg) translateX(-200px);opacity:0}}
@keyframes spot2{0%{transform:rotate(30deg) translateX(200px);opacity:0}15%{opacity:.6}50%{transform:rotate(-15deg) translateX(-150px);opacity:1}85%{opacity:.6}100%{transform:rotate(30deg) translateX(200px);opacity:0}}
@keyframes spot3{0%{transform:rotate(5deg) translateX(0);opacity:.3}33%{transform:rotate(-25deg) translateX(-180px);opacity:.7}66%{transform:rotate(25deg) translateX(180px);opacity:.5}100%{transform:rotate(5deg) translateX(0);opacity:.3}}

/* DRAFT OVERVIEW */
#overview{display:none;flex-direction:column;align-items:center;justify-content:center;gap:40px;padding:60px;}
#overview .ov-title{font-size:clamp(28px,4vw,52px);font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;}
#ov-portraits{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;}
.ov-card{display:flex;flex-direction:column;align-items:center;gap:10px;}
.ov-img{width:min(160px,15vw);height:min(90px,9vw);border-radius:6px;overflow:hidden;border:1px solid var(--gold-dim);}
.ov-img img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.ov-hero{font-size:clamp(14px,1.8vw,22px);font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;}
.ov-player{font-size:clamp(11px,1.2vw,16px);color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
</style>
</head>
<body>
<div id="screen">

  <div id="welcome">
    <div class="spotlight" style="animation:spot1 11s ease-in-out infinite;top:-100px;left:30%;"></div>
    <div class="spotlight" style="animation:spot2 14s ease-in-out infinite;top:-100px;left:50%;"></div>
    <div class="spotlight" style="animation:spot3 9s ease-in-out infinite;top:-100px;left:20%;"></div>
    <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/global/dota2_logo_symbol.png" style="width:min(320px,40vw);filter:drop-shadow(0 0 60px rgba(200,155,60,.6));animation:logoPulse 3s ease-in-out infinite;" alt="Dota 2">
    <div class="gold-line"></div>
    <div class="dhs-sub">Dreamhack Skyrup · Season VII</div>
  </div>

  <audio id="welcome-audio" src="/sounds/announcer/welcome.mp3" preload="auto"></audio>
  <audio id="game-audio" preload="none"></audio>
  <audio id="hero-audio" preload="none"></audio>

  <div id="unlock-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:24px;cursor:pointer;" onclick="unlockAudio()">
    <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/global/dota2_logo_symbol.png" style="width:120px;opacity:.6;" alt="Dota 2">
    <div style="font-size:22px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;">Klicka för att starta</div>
    <div style="font-size:14px;color:var(--text-dim);letter-spacing:.1em;">Aktiverar ljud</div>
  </div>

  <div id="idle">
    <div class="logo">DHS</div>
    <div class="gold-line"></div>
    <div class="sub">Dreamhack Skyrup · The Playbook</div>
    <div class="waiting">Väntar på nästa match...</div>
  </div>

  <div id="splash">
    <div class="strat-line"></div>
    <div class="strat-name" id="splash-name"></div>
    <div class="wild-badge" id="splash-wild" style="display:none">🎲 WILD CARD</div>
    <div class="strat-line"></div>
  </div>

  <div id="hero-reveal">
    <div id="hero-bg"></div>
    <div id="hero-content">
      <div id="hero-img-wrap"><img id="hero-img-tv" src="" alt=""></div>
      <div id="hero-name-tv"></div>
      <div id="player-name-tv"></div>
    </div>
    <div id="pick-counter"></div>
  </div>

  <div id="briefing-screen">
    <div class="brief-title">⚔ Kaptensbriefing</div>
    <div class="brief-text" id="brief-text"></div>
  </div>

  <div id="overview">
    <div class="ov-title" id="ov-title"></div>
    <div id="ov-portraits"></div>
  </div>

</div>
<script>
const CDN = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/';

function heroImgUrl(heroName) {
  if(!heroName) return '';
  var slugs = {
    'abaddon':'abaddon','alchemist':'alchemist','ancient apparition':'ancient_apparition',
    'anti-mage':'antimage','arc warden':'arc_warden','axe':'axe','bane':'bane',
    'batrider':'batrider','beastmaster':'beastmaster','bloodseeker':'bloodseeker',
    'bounty hunter':'bounty_hunter','brewmaster':'brewmaster','bristleback':'bristleback',
    'broodmother':'broodmother','centaur warrunner':'centaur','chaos knight':'chaos_knight',
    'chen':'chen','clinkz':'clinkz','clockwerk':'rattletrap','crystal maiden':'crystal_maiden',
    'dark seer':'dark_seer','dark willow':'dark_willow','dawnbreaker':'dawnbreaker',
    'dazzle':'dazzle','death prophet':'death_prophet','disruptor':'disruptor',
    'doom':'doom_bringer','dragon knight':'dragon_knight','drow ranger':'drow_ranger',
    'earth spirit':'earth_spirit','earthshaker':'earthshaker','elder titan':'elder_titan',
    'ember spirit':'ember_spirit','enchantress':'enchantress','enigma':'enigma',
    'faceless void':'faceless_void','grimstroke':'grimstroke','gyrocopter':'gyrocopter',
    'hoodwink':'hoodwink','huskar':'huskar','invoker':'invoker','io':'wisp',
    'jakiro':'jakiro','juggernaut':'juggernaut','keeper of the light':'keeper_of_the_light',
    'kez':'kez','kunkka':'kunkka','largo':'largo','legion commander':'legion_commander',
    'leshrac':'leshrac','lich':'lich','lifestealer':'life_stealer','lina':'lina',
    'lion':'lion','lone druid':'lone_druid','luna':'luna','lycan':'lycan',
    'magnus':'magnataur','marci':'marci','mars':'mars','medusa':'medusa','meepo':'meepo',
    'mirana':'mirana','monkey king':'monkey_king','morphling':'morphling','muerta':'muerta',
    'naga siren':'naga_siren',"nature's prophet":'furion','necrophos':'necrolyte',
    'night stalker':'night_stalker','nyx assassin':'nyx_assassin','ogre magi':'ogre_magi',
    'omniknight':'omniknight','oracle':'oracle','outworld devourer':'obsidian_destroyer',
    'outworld destroyer':'obsidian_destroyer','pangolier':'pangolier',
    'phantom assassin':'phantom_assassin','phantom lancer':'phantom_lancer',
    'phoenix':'phoenix','primal beast':'primal_beast','puck':'puck','pudge':'pudge',
    'pugna':'pugna','queen of pain':'queenofpain','razor':'razor','riki':'riki',
    'ring master':'ringmaster','rubick':'rubick','sand king':'sand_king',
    'shadow demon':'shadow_demon','shadow fiend':'nevermore','shadow shaman':'shadow_shaman',
    'silencer':'silencer','skywrath mage':'skywrath_mage','slardar':'slardar','slark':'slark',
    'snapfire':'snapfire','sniper':'sniper','spectre':'spectre','spirit breaker':'spirit_breaker',
    'storm spirit':'storm_spirit','sven':'sven','techies':'techies',
    'templar assassin':'templar_assassin','terrorblade':'terrorblade','tidehunter':'tidehunter',
    'timbersaw':'shredder','tinker':'tinker','tiny':'tiny','treant protector':'treant',
    'troll warlord':'troll_warlord','tusk':'tusk','underlord':'abyssal_underlord',
    'undying':'undying','ursa':'ursa','vengeful spirit':'vengefulspirit',
    'venomancer':'venomancer','viper':'viper','visage':'visage','void spirit':'void_spirit',
    'warlock':'warlock','weaver':'weaver','windranger':'windrunner',
    'winter wyvern':'winter_wyvern','witch doctor':'witch_doctor','wraith king':'skeleton_king',
    'zeus':'zuus'
  };
  var key = heroName.toLowerCase().trim();
  var slug = slugs[key] || key.replace(/['\s]+/g,'_').replace(/-/g,'_');
  return CDN + slug + '.png';
}

function show(id) {
  ['idle','welcome','splash','hero-reveal','briefing-screen','overview'].forEach(function(s){
    var el = document.getElementById(s);
    el.style.display = 'none';
    el.style.animation = '';
  });
  var el = document.getElementById(id);
  el.style.display = 'flex';
  el.style.animation = 'fadeIn .5s ease both';
}

function wait(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

var _audioUnlocked = false;

function unlockAudio() {
  document.getElementById('unlock-overlay').style.display = 'none';
  _audioUnlocked = true;
}


var _isPlaying = false;

async function runReveal(matchId) {
  if(_isPlaying) return;
  _isPlaying = true;
  try {
    var resp = await fetch('/api/matches/' + matchId);
    var m = await resp.json();
    if(!m || (!m.currentStrategy && !m.strategy)) { _isPlaying = false; return; }

    var draft = m.currentDraft || m.draft || {};
    var stratName = m.name || 'Draft Strategi';
    var briefing = m.briefing || '';
    var isWildcard = !!m.wildcard;
    var playerNames = Object.keys(draft);

    // Räkna matcher för att avgöra game-nummer
    var allMatchesResp = await fetch('/api/matches');
    var allMatches = await allMatchesResp.json();
    var gameNumber = allMatches.length; // denna match är redan sparad, så length = nuvarande game

    // GAME 1: Welcome-sekvens (33 sek)
    if(gameNumber === 1) {
      show('welcome');
      if(_audioUnlocked) {
        var wa = document.getElementById('welcome-audio');
        wa.currentTime = 0;
        wa.play().catch(function(){});
      }
      await wait(33000);
      await wait(2000);
    }

    // STEG 1: Strateginamnet + game_N.mp3 samtidigt
    document.getElementById('splash-name').textContent = stratName;
    document.getElementById('splash-wild').style.display = isWildcard ? 'block' : 'none';
    show('splash');
    if(_audioUnlocked) {
      var ga = document.getElementById('game-audio');
      ga.src = '/sounds/announcer/game_' + gameNumber + '.mp3';
      ga.currentTime = 0;
      ga.play().catch(function(){});
    }
    await wait(6000);

    // STEG 2: Hero reveal ett i taget
    for(var i = 0; i < playerNames.length; i++) {
      var playerName = playerNames[i];
      var heroName = draft[playerName];
      var imgUrl = heroImgUrl(heroName);

      document.getElementById('hero-bg').style.backgroundImage = imgUrl ? 'url(' + imgUrl + ')' : 'none';
      document.getElementById('hero-img-tv').src = imgUrl || '';
      document.getElementById('hero-name-tv').textContent = heroName || '?';
      document.getElementById('player-name-tv').textContent = playerName;
      document.getElementById('pick-counter').textContent = (i+1) + ' / ' + playerNames.length;

      show('hero-reveal');
      document.getElementById('hero-content').style.animation = 'slideUp .4s ease both';
      if(_audioUnlocked) {
        var heroSlug = heroName.toLowerCase().trim().replace(/['\s]+/g,'_').replace(/-/g,'_');
        var ha = document.getElementById('hero-audio');
        ha.src = '/sounds/heroes/' + heroSlug + '.mp3';
        ha.currentTime = 0;
        ha.play().catch(function(){});
      }
      await wait(4400);
    }

    // STEG 3: Briefing
    if(briefing) {
      document.getElementById('brief-text').textContent = briefing;
      show('briefing-screen');
      await wait(15000);
    }

    // STEG 4: Draft overview
    document.getElementById('ov-title').textContent = stratName;
    var portraits = document.getElementById('ov-portraits');
    portraits.innerHTML = '';
    playerNames.forEach(function(playerName) {
      var heroName = draft[playerName];
      var imgUrl = heroImgUrl(heroName);
      var card = document.createElement('div');
      card.className = 'ov-card';
      card.style.animation = 'slideUp .4s ease both';
      var imgWrap = document.createElement('div');
      imgWrap.className = 'ov-img';
      if(imgUrl) {
        var img = document.createElement('img');
        img.src = imgUrl;
        imgWrap.appendChild(img);
      }
      var hn = document.createElement('div');
      hn.className = 'ov-hero';
      hn.textContent = heroName || '?';
      var pn = document.createElement('div');
      pn.className = 'ov-player';
      pn.textContent = playerName;
      card.appendChild(imgWrap);
      card.appendChild(hn);
      card.appendChild(pn);
      portraits.appendChild(card);
    });
    show('overview');
    await wait(15000);

  } catch(e) { console.error(e); }

  // Tillbaka till idle
  show('idle');
  _isPlaying = false;
}

// Kolla direkt vid sidladdning
(async function() {
  try {
    var resp = await fetch('/api/status');
    var status = await resp.json();
    if(!status.generating && status.latestMatchId) {
      _lastMatchId = status.latestMatchId;
    }
  } catch(e) {}
})();

// Polling
var _pollGenerating = false;
setInterval(async function() {
  try {
    var resp = await fetch('/api/status');
    var status = await resp.json();

    if(status.generating && !_pollGenerating) {
      _pollGenerating = true;
    } else if(!status.generating && _pollGenerating) {
      _pollGenerating = false;
      var matchId = status.latestMatchId;
      if(matchId && matchId !== _lastMatchId) {
        _lastMatchId = matchId;
        runReveal(matchId);
      }
    }
  } catch(e) {}
}, 2000);
</script>
</body>
</html>

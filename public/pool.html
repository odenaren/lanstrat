<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mina hjältar</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#c89b3c;--gold-dim:#7a5c1e;--gold-light:#e8c46a;
  --bg:#0a0b0d;--surface:#15171c;--surface2:#1c1e24;--border:#2a2d35;
  --text:#e8e6e0;--text-dim:#8a877e;--green:#4caf50;
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 80px;}
header{text-align:center;margin-bottom:28px;}
header h1{font-size:28px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;}
header p{color:var(--text-dim);font-size:14px;margin-top:6px;}

#name-select{display:flex;flex-direction:column;gap:10px;}
.name-btn{padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s;text-align:left;}
.name-btn:active{transform:scale(.98);}
.name-btn:hover{border-color:var(--gold-dim);background:var(--surface2);}

#pool-view{display:none;}
.pool-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.pool-header h2{font-size:22px;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;}
.back-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;cursor:pointer;}
.count-badge{font-size:13px;color:var(--text-dim);margin-bottom:16px;}
.count-badge strong{color:var(--gold);}

.search-box{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;margin-bottom:16px;}
.search-box:focus{outline:none;border-color:var(--gold-dim);}

.attr-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.attr-tab{padding:6px 12px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.attr-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(200,155,60,.08);}

.hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;}
.hero-card{position:relative;border-radius:6px;overflow:hidden;border:2px solid var(--border);cursor:pointer;background:var(--surface);transition:all .15s;aspect-ratio:1.4;}
.hero-card img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;opacity:.55;transition:opacity .15s;}
.hero-card.selected{border-color:var(--gold);}
.hero-card.selected img{opacity:1;}
.hero-card.selected::after{content:'✓';position:absolute;top:4px;right:4px;width:20px;height:20px;background:var(--gold);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.hero-card-name{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;font-size:10px;font-weight:600;text-align:center;background:linear-gradient(transparent,rgba(0,0,0,.85));color:var(--text);text-transform:uppercase;letter-spacing:.02em;}

.save-status{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;text-align:center;font-size:13px;color:var(--text-dim);}
.save-status.saved{color:var(--green);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Mina Hjältar</h1>
    <p>Välj de hjältar du vill kunna spela</p>
  </header>

  <div id="name-select"></div>

  <div id="pool-view">
    <div class="pool-header">
      <h2 id="current-player-name"></h2>
      <button class="back-btn" onclick="goBack()">← Byt spelare</button>
    </div>
    <div class="count-badge"><strong id="pool-count">0</strong> hjältar valda</div>
    <input type="text" class="search-box" id="search" placeholder="Sök hjälte..." oninput="renderHeroes()">
    <div class="attr-tabs" id="attr-tabs"></div>
    <div class="hero-grid" id="hero-grid"></div>
  </div>
</div>

<div class="save-status" id="save-status">Ändringar sparas automatiskt</div>

};
const CDN = 'https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/';
const HERO_IMG_OVERRIDES = { 13: CDN+'kunkka.png', 35: CDN+'undying.png', 90: CDN+'enchantress.png', 99: CDN+'lion.png' };
function heroImg(id) {
  if(HERO_IMG_OVERRIDES[+id]) return HERO_IMG_OVERRIDES[+id];
  const slug = HERO_SLUGS[+id];
  if(!slug) return null;
  return CDN+slug+'.png';
}

let players = [];
let currentPlayer = null;
let currentAttr = 'all';
let saveTimeout = null;

async function apiFetch(path, options={}) {
  const res = await fetch(API+path, {headers:{'Content-Type':'application/json'},...options});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}

async function init() {
  try {
    const livePlayers = await apiFetch('/players');
    let draftPools = [];
    try { draftPools = await apiFetch('/draftpools'); } catch(e) {}

    players = livePlayers.map(p => {
      const draft = draftPools.find(d => d.name === p.name);
      return { name: p.name, heroes: draft ? (draft.heroes || []) : [] };
    });
  } catch(e) {
    document.getElementById('name-select').innerHTML = '<p style="color:var(--text-dim);text-align:center">Kunde inte ladda spelare. Försök igen senare.</p>';
    return;
  }
  renderNameSelect();
}

function renderNameSelect() {
  const el = document.getElementById('name-select');
  el.innerHTML = '';
  players.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'name-btn';
    const count = (p.heroes||[]).length;
    btn.innerHTML = p.name + (count ? ' <span style="color:var(--text-dim);font-size:13px;float:right">'+count+' valda</span>' : '');
    btn.onclick = () => selectPlayer(p.name);
    el.appendChild(btn);
  });
}

function selectPlayer(name) {
  currentPlayer = players.find(p => p.name === name);
  if(!currentPlayer) return;
  document.getElementById('name-select').style.display = 'none';
  document.getElementById('pool-view').style.display = 'block';
  document.getElementById('current-player-name').textContent = currentPlayer.name;
  renderAttrTabs();
  renderHeroes();
  updateCount();
}

function goBack() {
  document.getElementById('pool-view').style.display = 'none';
  document.getElementById('name-select').style.display = 'flex';
  currentPlayer = null;
  init();
}

function renderAttrTabs() {
  const tabs = [['all','Alla'],['str','Strength'],['agi','Agility'],['int','Intelligence'],['uni','Universal']];
  const el = document.getElementById('attr-tabs');
  el.innerHTML = '';
  tabs.forEach(([key,label]) => {
    const b = document.createElement('button');
    b.className = 'attr-tab' + (currentAttr===key ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { currentAttr = key; renderAttrTabs(); renderHeroes(); };
    el.appendChild(b);
  });
}

function renderHeroes() {
  const grid = document.getElementById('hero-grid');
  const search = document.getElementById('search').value.toLowerCase().trim();
  grid.innerHTML = '';
  const selected = new Set(currentPlayer.heroes || []);
  HERO_LIST.filter(h => {
    if(currentAttr !== 'all' && h.attr !== currentAttr) return false;
    if(search && !h.name.toLowerCase().includes(search)) return false;
    return true;
  }).forEach(h => {
    const card = document.createElement('div');
    card.className = 'hero-card' + (selected.has(h.name) ? ' selected' : '');
    const img = heroImg(h.id);
    card.innerHTML = (img ? '<img src="'+img+'" alt="">' : '') + '<div class="hero-card-name">'+h.name+'</div>';
    card.onclick = () => toggleHero(h.name);
    grid.appendChild(card);
  });
}

function toggleHero(name) {
  if(!currentPlayer.heroes) currentPlayer.heroes = [];
  const idx = currentPlayer.heroes.indexOf(name);
  if(idx >= 0) currentPlayer.heroes.splice(idx,1);
  else currentPlayer.heroes.push(name);
  renderHeroes();
  updateCount();
  scheduleSave();
}

function updateCount() {
  document.getElementById('pool-count').textContent = (currentPlayer.heroes||[]).length;
}

function scheduleSave() {
  const status = document.getElementById('save-status');
  status.textContent = 'Sparar...';
  status.classList.remove('saved');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(savePool, 800);
}

async function savePool() {
  try {
    await apiFetch('/draftpools/'+encodeURIComponent(currentPlayer.name)+'/heroes', {
      method:'PUT',
      body: JSON.stringify({heroes: currentPlayer.heroes||[]})
    });
    const status = document.getElementById('save-status');
    status.textContent = 'Sparat ✓';
    status.classList.add('saved');
  } catch(e) {
    document.getElementById('save-status').textContent = 'Kunde inte spara, försök igen';
  }
}

init();
</script>
</body>
</html>
